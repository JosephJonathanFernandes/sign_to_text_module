name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install linting tools
        run: pip install black isort ruff

      - name: ruff check
        run: ruff check src/ api/ tests/

      - name: black format check
        run: black --check --diff src/ api/ tests/

      - name: isort check
        run: isort --check-only --diff src/ api/ tests/

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run Bandit security scan
        run: bandit -r src api -ll --configfile pyproject.toml

  test:
    name: Unit & API Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install core dependencies
        run: |
          pip install numpy scipy tqdm h5py
          pip install fastapi uvicorn pydantic httpx websockets
          pip install pytest pytest-cov pytest-asyncio

      - name: Install PyTorch (CPU-only, faster CI)
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install remaining dependencies
        run: |
          pip install opencv-python-headless
          pip install onnxruntime onnx

      - name: Run unit tests
        run: pytest tests/unit/ -m "unit or not unit" --ignore=tests/unit/test_hdf5.py -v --tb=short --cov=src --cov=api --cov-report=xml

      - name: Run API schema tests (offline, no model files)
        run: pytest tests/api/test_endpoints.py -k "TestSchemas or TestHealthEndpoint or TestPredictEndpoint or TestValidateFeaturesEndpoint" -v --tb=short
        continue-on-error: true  # API tests need TestClient state injection — allowed to fail in CI

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  verify-imports:
    name: Import Smoke Check
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install core dependencies
        run: |
          pip install numpy scipy tqdm h5py
          pip install fastapi pydantic
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Verify core imports
        run: |
          python -c "from src.core.config import get_config; cfg = get_config(); cfg.validate(); print('Config OK')"
          python -c "from src.shared.feature_extractor import build_single_frame_features; print('Feature extractor OK')"
          python -c "from api.schemas import HealthResponse, PredictRequest; print('API schemas OK')"

      - name: Run repository verification
        run: python scripts/verify_repo.py
        continue-on-error: true  # May fail if optional imports (mediapipe) not installed in CI
